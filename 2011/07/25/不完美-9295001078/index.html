    <h1 class="post-title p-name" itemprop="name headline">不完美</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="2011-07-25T00:00:00+08:00" itemprop="datePublished">Jul 25, 2011
      </time></p>

  <div class="post-content e-content" itemprop="articleBody">
    <div class="article-content-inner" id="article-content-inner">
<p><br /><br />　不知道從什麼時候開始，至少是二十年前了吧，</p>
<p>　很容易看自己極度不順眼。</p>
<p>　凡大小事好比兩手不等長臉又黑又醜琴音不準或考試成績未到頂標等，</p>
<p>　反正就從來沒有真正喜歡上自己過。<br />　<br />　更奇怪的是雖然很容易因為這樣而過得不開心意志消沉，</p>
<p>　但卻從沒有想要提早結束這一切。</p>
<br />
<p><br />　雖然看自己不順眼，卻因看這世界很順眼所以想多看幾眼。</p><span><br /><br /><br /><br /><span><br /><br /><br /><br /></span><br /></span></div>
