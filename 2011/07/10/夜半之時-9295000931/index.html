    <h1 class="post-title p-name" itemprop="name headline">夜半之時</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="2011-07-10T00:00:00+08:00" itemprop="datePublished">Jul 10, 2011
      </time></p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    <div class="article-content-inner" id="article-content-inner">
<p><br /><br /><br /><br /><br /><br /><br />　我喜歡夜半之時，但這並不代表我熱愛生活中的陰暗端...</p>
<p><br />　我會感傷卻討厭矯情，<br /><br />　我喜歡小調卻不愛纏綿悱惻，<br />　<br />　我常歌頌悲傷卻唾棄整日愁眉苦臉。</p>
<p><br />　負面往往積極醞釀著然後襯托出正面的美好，<br /><br />　憂愁有如苦瓜般讓菜餚顯得更為甜蜜。</p>
<p><br />　人因挫折的洗禮愈發地強壯，<br /><br />　因藝術更貼近生活。</p>
<p><br />　何為藝術？</p>
<p>　非完美乃缺陷美矣。<br /><br /><br /><br /><br /></p></div>
